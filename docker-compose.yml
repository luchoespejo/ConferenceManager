services:
  postgres:
    image: postgres:16-alpine
    container_name: conference_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conference_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conference_backend
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=conference_db;Username=postgres;Password=${DB_PASSWORD:-postgres}"
      Jwt__SecretKey: ${JWT_SECRET_KEY:-this-is-a-very-long-secret-key-for-jwt-testing-32-chars-min}
      Jwt__Issuer: ConferenceManager
      Jwt__Audience: ConferenceManager
      Resend__ApiKey: ${RESEND_API_KEY}
      Resend__FromAddress: ${RESEND_FROM_ADDRESS:-noreply@tuplataforma.com}
      Email__UseFake: ${EMAIL_USE_FAKE:-false}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-http://localhost:3000}
      App__BaseUrl: ${APP_BASE_URL:-http://localhost:5000}
      App__SiteUrl: ${APP_SITE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Note: Render deploys Next.js site separately via Vercel
